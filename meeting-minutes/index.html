<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:,">
  <title>VCB Meeting Minutes</title>
  <script>
    // Mirror of the original Index.html head script: apply saved theme + language
    // immediately so first paint matches preference. Mobile detection too.
    (function () {
      function detect() {
        var ua = navigator.userAgent || '';
        var uaMobile = /iPhone|iPod|Android.*Mobile/i.test(ua);
        var sw = (typeof screen !== 'undefined' && screen.width) ? screen.width : 9999;
        var iw = window.innerWidth || 9999;
        var isMobile = uaMobile || sw <= 500 || iw <= 500;
        document.documentElement.classList.toggle('is-mobile', isMobile);
        if (isMobile && !document.documentElement.className.match(/mobile-pane-/)) {
          document.documentElement.classList.add('mobile-pane-projects');
        }
      }
      detect();
      window.addEventListener('resize', detect);
      window.addEventListener('orientationchange', detect);
      try {
        var t = localStorage.getItem('vcb_mm_theme');
        document.documentElement.classList.add('theme-' + (t === 'dark' ? 'dark' : 'light'));
      } catch (e) { document.documentElement.classList.add('theme-light'); }
      try {
        var l = localStorage.getItem('vcb_mm_lang');
        document.documentElement.classList.add('lang-' + (l === 'th' ? 'th' : 'en'));
      } catch (e) { document.documentElement.classList.add('lang-en'); }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
